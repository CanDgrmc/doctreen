name: Sync docs to doctreen.dev

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'wiki/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'manual sync'

# The docs site at https://doctreen.dev lives in a sibling repo (CanDgrmc/doctreen-ui)
# and is generated from the same sources tracked here:
#   * README.md       — the canonical public reference
#   * CHANGELOG.md    — feeds /docs/changelog
#   * wiki/**         — Architecture / Roadmap / Release Process get translated into MDX
#
# When any of those change on main, this workflow opens an issue on the docs repo
# with the diff so the change can be reviewed and ported. Optionally, it also kicks
# Vercel into a fresh redeploy.
#
# Required secrets (set in repo settings → Secrets and variables → Actions):
#   DOCS_SYNC_TOKEN          — PAT with `repo` scope on CanDgrmc/doctreen-ui
#                              (used to open an issue cross-repo).
#                              If absent, an issue is opened on THIS repo instead,
#                              labelled `docs-sync`, so nothing is silently dropped.
#   VERCEL_DEPLOY_HOOK_URL   — Optional. Vercel deploy hook URL for the doctreen-ui
#                              project. If set, the workflow POSTs to it after the
#                              issue is opened, triggering a fresh build.

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute changed sources
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(printf 'README.md\nCHANGELOG.md\n%s\n' "$(git ls-files 'wiki/*.md')")
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="$(git rev-parse "$AFTER^" 2>/dev/null || echo "")"
            fi
            if [ -z "$BEFORE" ]; then
              CHANGED=$(git diff --name-only "$AFTER" -- README.md CHANGELOG.md 'wiki/**' || true)
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- README.md CHANGELOG.md 'wiki/**' || true)
            fi
          fi

          if [ -z "$CHANGED" ]; then
            echo "No doc sources changed — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$CHANGED" > "$GITHUB_WORKSPACE/.changed-sources"

          SUBJECT=$(echo "${{ github.event.head_commit.message }}" | head -n1 | cut -c1-72)
          [ -z "$SUBJECT" ] && SUBJECT="manual sync"
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        if: steps.diff.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE="$GITHUB_WORKSPACE/.issue-body.md"

          {
            echo "Library doc sources changed on \`main\` — port them to [doctreen-ui](https://github.com/CanDgrmc/doctreen-ui) if the public docs at https://doctreen.dev need to follow."
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Message:** ${{ steps.diff.outputs.subject }}"
            echo "**Triggered by:** ${{ github.event_name }} (@${{ github.actor }})"
            echo ""
            echo "## Changed files"
            echo ""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "- \`$f\`"
            done < "$GITHUB_WORKSPACE/.changed-sources"
            echo ""
            echo "## Where each source maps in doctreen-ui"
            echo ""
            echo "| Source | Docs site location |"
            echo "|---|---|"
            echo "| \`README.md\` | \`content/docs/\` — split across index, installation, quick-start, adapters/, features/, guides/, reference/ |"
            echo "| \`CHANGELOG.md\` | \`content/docs/changelog.mdx\` (curated, not autogen) |"
            echo "| \`wiki/Architecture.md\` | \`content/docs/reference/architecture.mdx\` (translated) |"
            echo "| \`wiki/Roadmap.md\` | \`content/docs/roadmap.mdx\` |"
            echo "| \`wiki/<other>.md\` | Internal only — no port required unless surfaced from README |"
            echo ""
            echo "## Suggested workflow"
            echo ""
            echo "1. In \`doctreen-ui\`, edit the MDX files corresponding to the changed sources (see table above)."
            echo "2. Run \`pnpm build\` locally to verify."
            echo "3. Open a PR; merge → Vercel auto-deploys to https://doctreen.dev."
            echo ""
            echo "Close this issue when the docs site is in sync."
          } > "$BODY_FILE"

      - name: Open issue on doctreen-ui (cross-repo, preferred)
        if: steps.diff.outputs.skip != 'true' && env.DOCS_SYNC_TOKEN != ''
        env:
          DOCS_SYNC_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
          GH_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
        shell: bash
        run: |
          gh issue create \
            --repo CanDgrmc/doctreen-ui \
            --title "Sync docs: ${{ steps.diff.outputs.subject }}" \
            --body-file "$GITHUB_WORKSPACE/.issue-body.md" \
            --label docs-sync

      - name: Fallback — open issue on this repo
        if: steps.diff.outputs.skip != 'true' && env.DOCS_SYNC_TOKEN == ''
        env:
          DOCS_SYNC_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh label create docs-sync \
            --color 0E8A6A \
            --description "Tracks library changes that need to be ported to doctreen.dev" \
            2>/dev/null || true
          gh issue create \
            --title "Sync docs to doctreen.dev: ${{ steps.diff.outputs.subject }}" \
            --body-file "$GITHUB_WORKSPACE/.issue-body.md" \
            --label docs-sync

      - name: Optional — trigger a fresh Vercel deploy
        if: steps.diff.outputs.skip != 'true' && env.VERCEL_DEPLOY_HOOK_URL != ''
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          echo "Pinging Vercel deploy hook…"
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL" | head -c 500
          echo ""
